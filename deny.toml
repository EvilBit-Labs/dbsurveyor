# cargo-deny configuration for DBSurveyor
# See: https://embarkstudios.github.io/cargo-deny/

[graph]
# Must match GoReleaser targets in .goreleaser.yaml
targets = [
    "aarch64-apple-darwin",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "x86_64-pc-windows-gnu",
]
all-features = true
exclude-dev = false

[licenses]
unused-allowed-license = "allow"
# Allow common open source licenses used in the Rust ecosystem
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]

# Confidence threshold for license detection
confidence-threshold = 0.8

[bans]
# Warn on multiple versions instead of deny - common in large dependency trees
multiple-versions = "warn"
# Allow wildcards - cargo-deny incorrectly flags workspace dependencies
wildcards = "allow"
deny = [
    { crate = "git2", use-instead = "gix" },
    "libssh2-sys",
    { crate = "cmake", use-instead = "cc" },
]
# Note: openssl is a transitive dependency of tiberius (SQL Server adapter)
# We can't deny it since we need SQL Server support
skip = []
skip-tree = []

[advisories]
yanked = "deny"
ignore = [
    # RSA timing attack - no fix available, in sqlx-mysql transitive dependency
    # Review: check for upstream fix periodically (last checked 2026-04-04)
    "RUSTSEC-2023-0071",
    # hickory-proto NSEC3 unbounded loop on cross-zone responses.
    # As of 2026-05-04 the advisory has no fixed hickory-proto release,
    # so a hickory bump alone would not help; pulled in via mongodb,
    # which pins hickory ^0.25. dbsurveyor only resolves the operator-
    # supplied MongoDB cluster URI.
    # Remove when: hickory-proto publishes a fix AND mongodb releases a
    # version pulling that fix in.
    # (last checked 2026-05-04)
    "RUSTSEC-2026-0118",
    # hickory-proto O(n^2) name compression - fix in hickory-proto
    # >= 0.26.1; same chain as -0118 but here a fix exists upstream
    # and is blocked only by mongodb's ^0.25 pin. dbsurveyor only
    # encodes the operator-supplied MongoDB SRV URI.
    # Remove when: mongodb publishes a release depending on
    # hickory-proto >= 0.26.1.
    # (last checked 2026-05-04)
    "RUSTSEC-2026-0119",
]

[sources]
# Allow crates from crates.io
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[sources.allow-org]
# Allow specific organizations for git sources if needed
github = []
gitlab = []
bitbucket = []
