name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

permissions: {}

jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup summary
              run: |
                  echo "DBSurveyor development environment setup complete."
                  echo ""
                  echo "Available tools:"
                  echo "  - Rust toolchain: $(rustc --version)"
                  echo "  - Cargo: $(cargo --version)"
                  echo "  - cargo-nextest: $(cargo nextest --version)"
                  echo "  - cargo-llvm-cov: $(cargo llvm-cov --version)"
                  echo "  - cargo-audit: $(cargo audit --version)"
                  echo "  - cargo-deny: $(cargo deny --version)"
