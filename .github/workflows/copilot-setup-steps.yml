name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

permissions: {}

jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup summary
              run: |
                  echo "DBSurveyor development environment setup complete."
                  echo ""
                  echo "Available tools:"
                  echo "  - Rust toolchain: $(rustc --version)"
                  echo "  - Cargo: $(cargo --version)"
                  echo "  - cargo-nextest: $(cargo nextest --version)"
                  echo "  - cargo-llvm-cov: $(cargo llvm-cov --version)"
                  echo "  - cargo-audit: $(cargo audit --version)"
                  echo "  - cargo-deny: $(cargo deny --version)"
