# Release workflow for DBSurveyor
#
# Triggered by pushing a semver tag (e.g. v0.1.0).
# Builds 7 Rust binaries (1 postprocessor + 6 collector variants) across 6
# targets (42 total) using GoReleaser with cargo-zigbuild, Cosign for keyless
# signing, and Syft for SBOM generation.

name: Release

on:
    push:
        tags:
            - "v*.*.*"

env:
    CARGO_TERM_COLOR: always

jobs:
    validate:
        name: Quality Gate
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Check formatting
              run: cargo fmt --all -- --check
            - name: Run clippy
              run: cargo clippy --workspace --all-targets --all-features -- -D warnings
            - name: Run tests
              run: cargo nextest run --workspace --all-features
              env:
                  CARGO_TERM_COLOR: never
                  TERM: dumb

    release:
        needs: validate
        name: Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
            - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
              with:
                  toolchain: "1.93.1"
                  targets: >-
                      x86_64-unknown-linux-gnu,
                      aarch64-unknown-linux-gnu,
                      x86_64-unknown-linux-musl,
                      x86_64-apple-darwin,
                      aarch64-apple-darwin,
                      x86_64-pc-windows-gnu

            - name: Install cross-compilation dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-mingw-w64-x86-64 musl-tools

            - name: Run GoReleaser
              uses: goreleaser/goreleaser-action@v7
              with:
                  distribution: goreleaser
                  version: "~> v2"
                  args: release --clean
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

            - name: Attest build provenance
              uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
              with:
                  subject-path: "dist/**/*"
