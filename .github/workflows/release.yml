# Release workflow for DBSurveyor
#
# Triggered by pushing a semver tag (e.g. v0.1.0).
# Builds 7 Rust binaries (1 postprocessor + 6 collector variants) across 6
# targets (42 total) using GoReleaser with cargo-zigbuild, Cosign for keyless
# signing, and Syft for SBOM generation.

name: Release

on:
    push:
        tags:
            - "v*.*.*"

env:
    CARGO_TERM_COLOR: always

jobs:
    validate:
        name: Quality Gate
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Check formatting
              run: cargo fmt --all -- --check
            - name: Run clippy
              run: cargo clippy --workspace --all-targets --all-features -- -D warnings
            - name: Run tests
              run: cargo nextest run --workspace --all-features
              env:
                  CARGO_TERM_COLOR: never
                  TERM: dumb

    release:
        needs: validate
        name: Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 0
            - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
              with:
                  install: true
                  cache: true
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
              with:
                  toolchain: "1.93.1"
                  targets: >-
                      x86_64-unknown-linux-gnu,
                      aarch64-unknown-linux-gnu,
                      x86_64-unknown-linux-musl,
                      x86_64-apple-darwin,
                      aarch64-apple-darwin,
                      x86_64-pc-windows-gnu

            - name: Install cross-compilation dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-mingw-w64-x86-64 musl-tools

            - name: Run GoReleaser
              uses: goreleaser/goreleaser-action@v7
              with:
                  distribution: goreleaser
                  version: "~> v2"
                  args: release --clean
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

            - name: Attest build provenance
              uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
              with:
                  subject-path: "dist/**/*"
