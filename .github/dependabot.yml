version: 2
updates:
    - package-ecosystem: github-actions
      directory: "/"
      schedule:
          interval: daily
      open-pull-requests-limit: 10
      commit-message:
          prefix: "chore(deps)"
    - package-ecosystem: "devcontainers"
      directory: "/"
      schedule:
          interval: weekly
      commit-message:
          prefix: "chore(deps)"
    - package-ecosystem: "cargo"
      directory: "/"
      schedule:
          interval: weekly
      commit-message:
          prefix: "chore(deps)"
