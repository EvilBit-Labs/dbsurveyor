# .pre-commit-config.yaml

repos:
    # 🧼 Standard code cleanup hooks (language agnostic)
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          - id: check-added-large-files
            args: ["--maxkb=1024"]
            exclude: |
                (?x)^(
                        \.sql$|
                        \.dump$|
                        \.sqlite$|
                        \.db$
                )$
          - id: check-case-conflict
          - id: check-merge-conflict
          - id: check-illegal-windows-names
          - id: check-json
            types: [json]
          - id: check-toml
            types: [toml]
          - id: check-yaml
            types: [yaml]
            args: [--allow-multiple-documents]
          - id: check-xml
            types: [xml]
          - id: mixed-line-ending
            args: [--fix=auto]
            types: [text]
          - id: check-vcs-permalinks

    # 🦀 Rust clippy linting
    - repo: local
      hooks:
          - id: rust-clippy
            name: rust-clippy
            entry: cargo clippy -- -D warnings
            language: system
            pass_filenames: false
            always_run: true
            types: [rust]

    # 🦀 Rust formatting
    - repo: local
      hooks:
          - id: rust-fmt
            name: rust-fmt
            entry: cargo fmt -- --check
            language: system
            pass_filenames: false
            always_run: true
            types: [rust]

    # 🧪 GitHub Actions validation
    - repo: https://github.com/rhysd/actionlint
      rev: v1.7.12
      hooks:
          - id: actionlint
            types: [yaml]
            files: ".github/workflows/"
            exclude: ^.github/workflows/release.yml$

    # 🐚 Shell script validation
    - repo: https://github.com/koalaman/shellcheck-precommit
      rev: v0.11.0
      hooks:
          - id: shellcheck
            types: [shell]
            exclude: ^.github/workflows/release.yml$

    - repo: https://github.com/bnjbvr/cargo-machete
      rev: v0.9.1
      hooks:
          - id: cargo-machete
            types: [cargo, cargo-lock]

    # 📝 Markdown formatting and linting (temporarily disabled in CI due to path issues)
    - repo: https://github.com/executablebooks/mdformat
      rev: 1.0.0
      hooks:
          - id: mdformat
            additional_dependencies:
                - mdformat-gfm
                - mdformat-admon
                - mdformat-config
                - mdformat-footnote
                - mdformat-simple-breaks
                - mdformat-web
                - mdformat-ruff
                - mdformat-gfm-alerts
                - mdformat-toc
                - mdformat-front-matters
            types: [markdown]

    # 🔒 Security audit for Rust dependencies (moved to CI)
    - repo: local
      hooks:
          - id: cargo-audit
            name: cargo-audit
            entry: cargo audit
            language: system
            pass_filenames: false
            always_run: true
            types: [cargo, cargo-lock]
