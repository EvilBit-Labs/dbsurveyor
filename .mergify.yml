queue_rules:
    # Dosubot: only needs quality (fmt + clippy) to pass
    - name: dosubot
      merge_method: squash
      autoqueue: true
      queue_conditions:
          - base = main
          - label != do-not-merge
          - author = dosubot[bot]
      merge_conditions:
          - check-success = quality

    # Dependabot: full CI required
    - name: dependabot
      merge_method: squash
      autoqueue: true
      queue_conditions:
          - base = main
          - label != do-not-merge
          - author = dependabot[bot]
      merge_conditions:
          - check-success = quality
          - check-success = Tests (postgresql)
          - check-success = Tests (sqlite)
          - check-success = Tests (mysql)
          - check-success = Tests (mongodb)
          - check-success = Tests (mssql)
          - check-success = Tests (encryption)
          - check-success = Tests (compression)
          - check-success = Test Coverage
          - check-success = Build Binaries

    # Release-plz: DCO only (exempt from full CI -- code already tested on main)
    - name: release-plz
      merge_method: squash
      autoqueue: true
      queue_conditions:
          - base = main
          - label != do-not-merge
          - author = release-plz[bot]
          - head ~= ^release-plz-
      merge_conditions:
          - check-success = DCO

    # Human PRs: manually enqueued via @mergifyio queue command
    - name: default
      merge_method: squash
      queue_conditions:
          - base = main
          - label != do-not-merge
          - author != dependabot[bot]
          - author != dosubot[bot]
          - -head ~= ^release-plz-
      merge_conditions:
          - check-success = quality
          - check-success = Tests (postgresql)
          - check-success = Tests (sqlite)
          - check-success = Tests (mysql)
          - check-success = Tests (mongodb)
          - check-success = Tests (mssql)
          - check-success = Tests (encryption)
          - check-success = Tests (compression)
          - check-success = Test Coverage
          - check-success = Build Binaries

pull_request_rules:
    - name: Auto-approve dosubot PRs
      conditions:
          - base = main
          - author = dosubot[bot]
      actions:
          review:
              type: APPROVE
              message: Automatically approved by Mergify

    - name: Auto-approve dependabot PRs
      conditions:
          - base = main
          - author = dependabot[bot]
      actions:
          review:
              type: APPROVE
              message: Automatically approved by Mergify

    - name: Keep PRs up to date with main
      conditions:
          - base = main
          - -conflict
          - -draft
      actions:
          update: {}

merge_protections:
    - name: Enforce conventional commit
      description: >-
          Require conventional commit format per https://www.conventionalcommits.org/en/v1.0.0/.
          Skipped for bots.
      if:
          - base = main
          - author != dependabot[bot]
          - author != dosubot[bot]
          - -head ~= ^release-plz-
      success_conditions:
          - "title ~= ^(fix|feat|docs|style|refactor|perf|test|build|ci|chore|revert)(?:\\(.+\\))?!?:"

    - name: Full CI must pass
      description: >-
          All CI checks must pass. Release-plz PRs are exempt because they only
          bump versions and changelogs (code was already tested on main), and
          GITHUB_TOKEN-triggered force-pushes suppress CI.
      if:
          - base = main
          - -head ~= ^release-plz-
      success_conditions:
          - check-success = quality
          - check-success = Tests (postgresql)
          - check-success = Tests (sqlite)
          - check-success = Tests (mysql)
          - check-success = Tests (mongodb)
          - check-success = Tests (mssql)
          - check-success = Tests (encryption)
          - check-success = Tests (compression)
          - check-success = Test Coverage
          - check-success = Build Binaries

    - name: Do not merge outdated PRs
      description: Make sure PRs are within 10 commits of the base branch before merging
      if:
          - base = main
      success_conditions:
          - "#commits-behind <= 10"
