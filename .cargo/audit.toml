# cargo-audit configuration for DBSurveyor
# See: https://rustsec.org/

[advisories]
ignore = [
    # RSA timing attack (Marvin Attack) - no upstream fix available
    # Transitive dep via sqlx-mysql. MySQL is not enabled by default.
    # Review: check for upstream fix periodically (last checked 2026-04-04)
    "RUSTSEC-2023-0071",
    # hickory-proto NSEC3 closest-encloser unbounded loop - NO upstream fix.
    # Pulled in via the mongodb crate, whose manifest pins both
    # hickory-proto and hickory-resolver to ^0.25; we cannot move to a
    # fixed version of hickory-proto without an upstream mongodb release
    # that relaxes that constraint. dbsurveyor only resolves the user-
    # supplied MongoDB cluster URI, so attacker-controlled DNS responses
    # would have to come from a compromised/hostile resolver.
    # Remove when: mongodb publishes a release depending on hickory >= 0.26.
    # (last checked 2026-05-03)
    "RUSTSEC-2026-0118",
    # hickory-proto O(n^2) name compression CPU exhaustion - fix in 0.26.1.
    # Same chain as -0118: blocked by mongodb's ^0.25 hickory pin.
    # dbsurveyor never encodes untrusted DNS names; the only encoded name
    # is the configured MongoDB SRV cluster URI under the operator's
    # control.
    # Remove when: mongodb publishes a release depending on hickory >= 0.26.
    # (last checked 2026-05-03)
    "RUSTSEC-2026-0119",
]
